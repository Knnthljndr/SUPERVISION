<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supervisión de Caja</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }
  .app { width: 100%; max-width: 420px; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); min-height: 100dvh; max-height: 100dvh; display: flex; flex-direction: column; }
  .screen { display: none; padding: 1.5rem 1.25rem; flex: 1; overflow-y: auto; }
  .screen.active { display: flex; flex-direction: column; }
  .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  input[type=text], input[type=password], input[type=email] {
    width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 15px; color: #111; background: #fafaf8; margin-bottom: 10px;
    outline: none; transition: border 0.15s;
  }
  input:focus { border-color: #111; background: #fff; }
  .btn { width: 100%; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; background: #f5f5f0; color: #111; transition: all 0.15s; }
  .btn:hover { background: #eee; }
  .btn-primary { background: #111; color: #fff; border-color: #111; }
  .btn-primary:hover { background: #333; }
  .btn-danger { background: #fff0f0; color: #c0392b; border-color: #f5c6c6; font-size: 12px; width: auto; padding: 5px 10px; }
  .btn + .btn { margin-top: 8px; }
  .error { font-size: 13px; color: #c0392b; margin-bottom: 10px; min-height: 18px; }
  .nav-back { font-size: 14px; color: #888; cursor: pointer; margin-bottom: 1.25rem; display: inline-flex; align-items: center; gap: 4px; }
  .nav-back:hover { color: #111; }
  .progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: #111; border-radius: 2px; transition: width 0.35s ease; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
  .q-label { font-size: 17px; font-weight: 500; line-height: 1.5; color: #111; margin-bottom: 1.5rem; flex: 1; }
  .q-btn-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .q-btn {
    flex: 1; padding: 18px 8px; font-size: 16px; font-weight: 600;
    border-radius: 12px; cursor: pointer;
    border: 2px solid #e8e8e4;
    background: #fafaf8; color: #888;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .q-btn .icon { font-size: 26px; line-height: 1; }
  .q-btn:hover { border-color: #bbb; color: #111; }
  .q-btn.selected-si { background: #16a34a; color: #fff; border-color: #16a34a; }
  .q-btn.selected-no { background: #dc2626; color: #fff; border-color: #dc2626; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
  .badge-ok { background: #16a34a; color: #fff; }
  .badge-fail { background: #dc2626; color: #fff; }
  .sv-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px; color: #111; }
  .sv-row:last-child { border-bottom: none; }
  .pin-chip { font-size: 12px; color: #aaa; font-family: monospace; margin-right: 8px; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px; }
  .result-row:last-child { border-bottom: none; }
  .email-preview { font-size: 12px; background: #fafaf8; border-radius: 10px; padding: 12px; color: #666; line-height: 1.7; white-space: pre-wrap; font-family: monospace; border: 1px solid #eee; }
  .tab-bar { display: flex; gap: 4px; margin: 1rem 0 1.25rem; }
  .tab { flex: 1; padding: 8px; font-size: 13px; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid #e8e8e4; background: #fafaf8; color: #888; font-weight: 500; transition: all 0.15s; }
  .tab.active { background: #111; color: #fff; border-color: #111; }
  .add-form { background: #fafaf8; border-radius: 10px; padding: 12px; margin-bottom: 1rem; border: 1px solid #eee; }
  .add-form input { margin-bottom: 8px; }
  .inline-row { display: flex; gap: 8px; }
  .inline-row input { margin-bottom: 0; flex: 1; }
  .home-icon { font-size: 48px; margin-bottom: 12px; }
  .spacer { flex: 1; }
  .result-header { text-align: center; padding: 1.5rem 0 1rem; }
  .result-icon { font-size: 40px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const state = {
  screen: 'home',
  admin: { pin: '1234', email: 'contadora@empresa.com' },
  supervisors: [
    { id: 1, name: 'Carlos Mendez', pin: '4521' },
    { id: 2, name: 'María Torres', pin: '7890' },
  ],
  questions: [
    'El cajón de dinero está ordenado y contado',
    'El área de trabajo está limpia y sin desechos',
    'Los recibos y documentos están archivados',
    'El sistema de caja fue cerrado correctamente',
    'No hay objetos personales en el área de caja',
  ],
  survey: { supervisor: null, answers: {}, currentQ: 0 },
  adminTab: 'supervisors',
};

function render() {
  const app = document.getElementById('app');
  const s = state.screen;
  if (s === 'home') app.innerHTML = homeScreen();
  else if (s === 'supervisor-login') app.innerHTML = supervisorLogin();
  else if (s === 'survey') app.innerHTML = surveyScreen();
  else if (s === 'survey-done') app.innerHTML = surveyDone();
  else if (s === 'admin-login') app.innerHTML = adminLogin();
  else if (s === 'admin') app.innerHTML = adminScreen();
  attachListeners();
}

function homeScreen() {
  return `<div class="screen active" style="justify-content:center;align-items:center;text-align:center;">
    <div class="home-icon">✓</div>
    <h1>Supervisión de Caja</h1>
    <p class="subtitle" style="margin-bottom:2.5rem;">Registro diario de limpieza y orden</p>
    <div style="width:100%;">
      <button class="btn btn-primary" onclick="go('supervisor-login')">Soy supervisor — ingresar</button>
      <button class="btn" onclick="go('admin-login')">Administrador</button>
    </div>
  </div>`;
}

function supervisorLogin() {
  return `<div class="screen active">
    <span class="nav-back" onclick="go('home')">← Volver</span>
    <h1>Identificación</h1>
    <p class="subtitle">Ingresa tu nombre y clave asignada</p>
    <input type="text" id="sv-name" placeholder="Nombre completo" autocomplete="off" />
    <input type="password" id="sv-pin" placeholder="Clave (PIN)" />
    <div class="error" id="sv-error"></div>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="sv-submit">Continuar →</button>
  </div>`;
}

function surveyScreen() {
  const total = state.questions.length;
  const cur = state.survey.currentQ;
  const q = state.questions[cur];
  const ans = state.survey.answers[cur];
  const pct = ((cur) / total) * 100;
  return `<div class="screen active">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="section-label">Pregunta ${cur + 1} de ${total}</div>
    <div class="q-label">${q}</div>
    <div class="q-btn-group">
      <button class="q-btn ${ans === 'si' ? 'selected-si' : ''}" id="ans-si">
        <span class="icon">✓</span><span>Sí</span>
      </button>
      <button class="q-btn ${ans === 'no' ? 'selected-no' : ''}" id="ans-no">
        <span class="icon">✕</span><span>No</span>
      </button>
    </div>
    <div class="spacer"></div>
    ${ans !== undefined
      ? `<button class="btn btn-primary" id="q-next">${cur === total - 1 ? 'Finalizar encuesta' : 'Siguiente →'}</button>`
      : `<button class="btn" style="opacity:0.3;cursor:default;" disabled>Selecciona una opción</button>`
    }
    ${cur > 0 ? `<button class="btn" id="q-prev" style="margin-top:8px;">← Atrás</button>` : ''}
  </div>`;
}

function surveyDone() {
  const sv = state.survey.supervisor;
  const ans = state.survey.answers;
  const qs = state.questions;
  const total = qs.length;
  const passed = Object.values(ans).filter(v => v === 'si').length;
  const hasFaults = passed < total;
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-EC', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const timeStr = now.toLocaleTimeString('es-EC', { hour:'2-digit', minute:'2-digit' });
  const rows = qs.map((q, i) => `
    <div class="result-row">
      <span style="flex:1;padding-right:8px;color:#111;">${q}</span>
      <span class="badge ${ans[i]==='si'?'badge-ok':'badge-fail'}">${ans[i]==='si'?'Sí':'No'}</span>
    </div>`).join('');
  const emailBody = `Para: ${state.admin.email}\nAsunto: Supervisión de caja — ${sv} — ${dateStr}\n\nSupervisor: ${sv}\nFecha: ${dateStr} — ${timeStr}\n\n${qs.map((q,i)=>`${i+1}. ${q}: ${ans[i]==='si'?'SÍ':'NO'}`).join('\n')}\n\nResultado: ${passed}/${total} ítems cumplidos${hasFaults?'\n⚠ Hay observaciones pendientes.':'\n✓ Todo en orden.'}`;
  return `<div class="screen active">
    <div class="result-header">
      <div class="result-icon">${hasFaults ? '⚠️' : '✅'}</div>
      <h1>${hasFaults ? 'Hay observaciones' : 'Todo en orden'}</h1>
      <p class="subtitle" style="margin-bottom:0;">${sv} · ${timeStr}</p>
    </div>
    <div class="card">
      <div class="section-label">Respuestas</div>
      ${rows}
    </div>
    <div class="card">
      <div class="section-label">Correo enviado a contadora</div>
      <div class="email-preview">${emailBody}</div>
    </div>
    <button class="btn btn-primary" onclick="go('home')" style="margin-top:auto;">Finalizar</button>
  </div>`;
}

function adminLogin() {
  return `<div class="screen active">
    <span class="nav-back" onclick="go('home')">← Volver</span>
    <h1>Acceso admin</h1>
    <p class="subtitle">Ingresa tu PIN de administrador</p>
    <input type="password" id="admin-pin" placeholder="PIN administrador" />
    <div class="error" id="admin-error"></div>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="admin-submit">Entrar →</button>
  </div>`;
}

function adminScreen() {
  return `<div class="screen active">
    <span class="nav-back" onclick="go('home')">← Volver</span>
    <h1>Administración</h1>
    <div class="tab-bar">
      <div class="tab ${state.adminTab==='supervisors'?'active':''}" onclick="setTab('supervisors')">Supervisores</div>
      <div class="tab ${state.adminTab==='questions'?'active':''}" onclick="setTab('questions')">Preguntas</div>
      <div class="tab ${state.adminTab==='settings'?'active':''}" onclick="setTab('settings')">Config</div>
    </div>
    ${state.adminTab==='supervisors' ? tabSupervisors() : ''}
    ${state.adminTab==='questions' ? tabQuestions() : ''}
    ${state.adminTab==='settings' ? tabSettings() : ''}
  </div>`;
}

function tabSupervisors() {
  const rows = state.supervisors.map(s => `
    <div class="sv-row">
      <span>${s.name}</span>
      <div style="display:flex;align-items:center;">
        <span class="pin-chip">PIN: ${s.pin}</span>
        <button class="btn btn-danger" onclick="removeSupervisor(${s.id})">Eliminar</button>
      </div>
    </div>`).join('') || '<div style="font-size:14px;color:#aaa;padding:8px 0;">Sin supervisores aún</div>';
  return `<div>
    <div class="section-label">Supervisores activos</div>
    <div class="card" style="margin-bottom:1rem;">${rows}</div>
    <div class="section-label">Agregar supervisor</div>
    <div class="add-form">
      <div class="inline-row" style="margin-bottom:8px;">
        <input type="text" id="new-sv-name" placeholder="Nombre completo" />
        <input type="text" id="new-sv-pin" placeholder="PIN" style="max-width:90px;" />
      </div>
      <button class="btn btn-primary" id="add-sv-btn">Agregar</button>
    </div>
  </div>`;
}

function tabQuestions() {
  const rows = state.questions.map((q, i) => `
    <div class="sv-row">
      <span style="flex:1;padding-right:8px;">${i+1}. ${q}</span>
      <button class="btn btn-danger" onclick="removeQuestion(${i})">Eliminar</button>
    </div>`).join('');
  return `<div>
    <div class="section-label">Preguntas activas</div>
    <div class="card" style="margin-bottom:1rem;">${rows}</div>
    <div class="section-label">Agregar pregunta</div>
    <div class="add-form">
      <input type="text" id="new-question" placeholder="Nueva pregunta de sí/no..." />
      <button class="btn btn-primary" id="add-q-btn">Agregar</button>
    </div>
  </div>`;
}

function tabSettings() {
  return `<div>
    <div class="section-label">Correo de la contadora</div>
    <div class="add-form">
      <input type="email" id="settings-email" value="${state.admin.email}" />
      <button class="btn btn-primary" id="save-email-btn">Guardar correo</button>
    </div>
    <div class="section-label">Cambiar PIN de admin</div>
    <div class="add-form">
      <input type="password" id="new-admin-pin" placeholder="Nuevo PIN" />
      <button class="btn" id="save-pin-btn">Actualizar PIN</button>
    </div>
  </div>`;
}

function go(screen) {
  state.screen = screen;
  if (screen === 'survey') { state.survey.answers = {}; state.survey.currentQ = 0; }
  render();
}
function setTab(tab) { state.adminTab = tab; render(); }
function removeSupervisor(id) { state.supervisors = state.supervisors.filter(s => s.id !== id); render(); }
function removeQuestion(i) { state.questions.splice(i, 1); render(); }

function attachListeners() {
  const svSubmit = document.getElementById('sv-submit');
  if (svSubmit) svSubmit.onclick = () => {
    const name = document.getElementById('sv-name').value.trim();
    const pin = document.getElementById('sv-pin').value.trim();
    const found = state.supervisors.find(s => s.pin === pin && s.name.toLowerCase() === name.toLowerCase());
    if (!found) { document.getElementById('sv-error').textContent = 'Nombre o clave incorrectos.'; return; }
    state.survey.supervisor = found.name;
    go('survey');
  };
  const adminSubmit = document.getElementById('admin-submit');
  if (adminSubmit) adminSubmit.onclick = () => {
    const pin = document.getElementById('admin-pin').value.trim();
    if (pin !== state.admin.pin) { document.getElementById('admin-error').textContent = 'PIN incorrecto.'; return; }
    go('admin');
  };
  const ansSi = document.getElementById('ans-si');
  const ansNo = document.getElementById('ans-no');
  if (ansSi) ansSi.onclick = () => { state.survey.answers[state.survey.currentQ] = 'si'; render(); };
  if (ansNo) ansNo.onclick = () => { state.survey.answers[state.survey.currentQ] = 'no'; render(); };
  const qNext = document.getElementById('q-next');
  if (qNext) qNext.onclick = () => {
    const total = state.questions.length;
    const cur = state.survey.currentQ;
    if (cur < total - 1) { state.survey.currentQ++; render(); }
    else go('survey-done');
  };
  const qPrev = document.getElementById('q-prev');
  if (qPrev) qPrev.onclick = () => { state.survey.currentQ--; render(); };
  const addSv = document.getElementById('add-sv-btn');
  if (addSv) addSv.onclick = () => {
    const name = document.getElementById('new-sv-name').value.trim();
    const pin = document.getElementById('new-sv-pin').value.trim();
    if (!name || !pin) return;
    state.supervisors.push({ id: Date.now(), name, pin });
    render();
  };
  const addQ = document.getElementById('add-q-btn');
  if (addQ) addQ.onclick = () => {
    const q = document.getElementById('new-question').value.trim();
    if (!q) return;
    state.questions.push(q);
    render();
  };
  const saveEmail = document.getElementById('save-email-btn');
  if (saveEmail) saveEmail.onclick = () => {
    const email = document.getElementById('settings-email').value.trim();
    if (!email) return;
    state.admin.email = email;
    alert('Correo guardado: ' + email);
  };
  const savePin = document.getElementById('save-pin-btn');
  if (savePin) savePin.onclick = () => {
    const pin = document.getElementById('new-admin-pin').value.trim();
    if (!pin) return;
    state.admin.pin = pin;
    alert('PIN actualizado.');
  };
}

render();
</script>
</body>
</html>
